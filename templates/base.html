<!-- templates/base.html -->
<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>CV Rating System</title>
    <link href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.2/dist/css/bootstrap.min.css" rel="stylesheet">
</head>
<body>

<nav class="navbar navbar-expand-lg navbar-dark bg-dark mb-4">
    <div class="container-fluid">
        <a class="navbar-brand" href="{% url 'requirements_list' %}">CV Rating</a>
        <div>
            <a class="btn btn-outline-light btn-sm me-2" href="{% url 'requirements_list' %}">Requirements</a>
            <a class="btn btn-outline-light btn-sm me-2" href="{% url 'add_requirement' %}">Add Requirement</a>
            <a class="btn btn-outline-light btn-sm" href="{% url 'upload_cv' %}">Upload CV</a>
        </div>
    </div>
</nav>

<div class="container">
    {% block content %}
    {% endblock %}
</div>

</body>
</html>
