{% extends "base.html" %}
{% block content %}

<div class="container mt-2">
    <h2 class="mb-3">Add Job Requirement</h2>

    {% if messages %}
        {% for m in messages %}
            <div class="alert alert-{{ m.tags|default:'info' }} mb-2">
                {{ m }}
            </div>
        {% endfor %}
    {% endif %}

    <form method="post">
        {% csrf_token %}

        <div class="mb-3">
            <label class="form-label">Job Title<span class="text-danger">*</span></label>
            <input type="text" name="title" class="form-control"
                   value="{{ title|default_if_none:'' }}" placeholder="Python Full Stack Developer">
        </div>

        <div class="mb-3">
            <label class="form-label">Location</label>
            <input type="text" name="location" class="form-control"
                   value="{{ location|default_if_none:'' }}" placeholder="Kochi / Remote">
        </div>

        <div class="mb-3">
            <label class="form-label">Experience (e.g. 0–2 years)</label>
            <input type="text" name="experience" class="form-control"
                   value="{{ experience|default_if_none:'' }}" placeholder="0–2 years">
        </div>

        <div class="mb-3">
            <label class="form-label">Key Skills (comma separated)</label>
            <textarea name="skills" rows="3" class="form-control"
                      placeholder="Python, Django, REST API, HTML, CSS, JavaScript">{{ skills|default_if_none:'' }}</textarea>
        </div>

        <div class="mb-3">
            <label class="form-label">Full Job Description<span class="text-danger">*</span></label>
            <textarea name="job_description" rows="8" class="form-control"
                      placeholder="Describe responsibilities, must-have skills, nice-to-have skills, etc.">{{ job_description|default_if_none:'' }}</textarea>
        </div>

        <button type="submit" class="btn btn-primary">Save Requirement</button>
        <a href="{% url 'requirements_list' %}" class="btn btn-secondary ms-2">Back</a>
    </form>
</div>

{% endblock %}
